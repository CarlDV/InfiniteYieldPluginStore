<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plugin Authors — Infinite Yield Plugins</title>
    <meta name="description" content="Meet the creators behind your favorite Infinite Yield plugins. Browse plugins and discover new authors.">

    <!-- Open Graph / Discord Embed Meta Tags -->
    <meta property="og:title" content="Plugin Authors — Infinite Yield Plugins">
    <meta property="og:description"
        content="Meet the creators behind your favorite Infinite Yield plugins. Browse plugins and discover new authors.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://iyplugins.pages.dev/authors.html">
    <meta property="og:image" content="https://iyplugins.pages.dev/emb/emb.webp">
    <meta name="theme-color" content="#00f7ff">

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="Plugin Authors — Infinite Yield Plugins">
    <meta name="twitter:description"
        content="Meet the creators behind your favorite Infinite Yield plugins. Browse plugins and discover new authors.">
    <meta name="twitter:image" content="https://iyplugins.pages.dev/emb/emb.webp">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="Logo_Small.png" type="image/x-icon">
</head>

<body>
    <header>
        <div class="header-inner">
            <div class="header-left">
                <a class="logo" href="/">
                    <img src="Logo_Small.png" alt="" class="brand-logo">
                    Plugins
                </a>
                <button class="burger-btn" id="burger-btn" aria-label="Toggle menu">
                    <span></span><span></span><span></span>
                </button>
            </div>
            <div class="header-links" id="header-links">
                <a href="authors.html" class="h-link h-link-api">Authors</a>
                <a href="maker.html" class="h-link">Plugin Maker</a>
                <a href="tutorial.html" class="h-link">Help & FAQ</a>
                <a href="api.html" class="h-link">API</a>
                <a href="https://iy-analytics.renern.workers.dev" class="h-link">Analytics</a>
                <a href="https://discord.gg/78ZuWSq" target="_blank" rel="noopener" class="h-link">IY Discord</a>
                <a href="https://github.com/CarlDV/InfiniteYieldPluginStore" target="_blank" rel="noopener"
                    class="h-link">WebpageRepo</a>
                <a href="https://github.com/EdgeIY/infiniteyield" target="_blank" rel="noopener" class="h-link">IY
                    GitHub</a>
            </div>
        </div>
    </header>

    <div id="content-area">
    <div class="authors-container">
        <div class="authors-hero">
            <h1>Plugin Authors</h1>
            <p>Browse the creators behind Infinite Yield plugins. Click an author to view all their published work.</p>
        </div>

        <div class="authors-toolbar">
            <div class="search-wrap">
                <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <circle cx="11" cy="11" r="8" />
                    <path d="m21 21-4.35-4.35" />
                </svg>
                <input type="text" id="author-search" placeholder="Search authors..." autocomplete="off">
            </div>
            <select id="author-sort">
                <option value="plugins">Most Plugins</option>
                <option value="name">A–Z</option>
                <option value="recent">Most Recent</option>
            </select>
        </div>

        <div class="authors-grid" id="authors-grid"></div>
        <div class="authors-empty hidden" id="authors-empty">No authors found.</div>
        <div class="status" id="authors-loading">Loading authors...</div>
    </div>

    <!-- Author Modal -->
    <div class="overlay hidden" id="author-overlay">
        <div class="modal" id="author-modal">
            <div class="modal-top">
                <div class="modal-head">
                    <div id="am-avatar-wrap"></div>
                    <div class="author-modal-info" id="am-info"></div>
                </div>
                <button class="close-btn" id="am-close">&times;</button>
            </div>
            <div class="author-modal-body" id="am-body"></div>
        </div>
    </div>

    <!-- Plugin Preview Modal -->
    <div class="overlay hidden" id="plugin-overlay" style="z-index: 2000;">
        <div class="modal" id="plugin-modal">
            <div class="modal-top">
                <div class="modal-head">
                    <div class="m-avatar" id="pm-avatar"></div>
                    <div class="m-meta">
                        <h2 id="pm-title"></h2>
                        <div class="m-info">
                            <span id="pm-author"></span>
                            <span class="sep">·</span>
                            <span id="pm-date"></span>
                            <a id="pm-msg-link" href="#" target="_blank" rel="noopener" class="msg-btn hidden">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                                    style="margin-right:4px">
                                    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                    <polyline points="15 3 21 3 21 9"></polyline>
                                    <line x1="10" y1="14" x2="21" y2="3"></line>
                                </svg>
                                Message
                            </a>
                        </div>
                    </div>
                </div>
                <button class="close-btn" id="pm-close">&times;</button>
            </div>
            <div class="modal-body" id="pm-body"></div>
        </div>
    </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-lua.min.js"></script>
    <script src="authors.js"></script>
    <script src="router.js"></script>
</body>

</html>
