name: Update Plugins JSON

on:
  schedule:
    - cron: '0 */20 * * *'
  workflow_dispatch:

jobs:
  update-plugins:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd plugin-pages-repo/scraper
          pip install -r requirements.txt

      - name: Run Scraper
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          PYTHONUNBUFFERED: 1
        run: |
          cd plugin-pages-repo/scraper
          python scraper.py

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update plugins.json"
          file_pattern: 'data/plugins.json'
